patterns:
  - pattern_id: "google_auth_result"
    name: "Google認証試験結果通知"
    description: "5ワード中4つ以上ヒットした場合に通知"
    veto_keywords:
      - "現状報告"
    keywords:
      should:
        - "Google認証"
        - "全件Pass"
        - "大橋様"
        - "https://app.box.com/"
    regex_rules:
      - regex: "\\[リザルト(の)?格納先\\]"
        weight: 20
    threshold:
      notify_min_score: 80

  - pattern_id: "bts_gts_edi_result"
    name: "BTS/GtsEdiHostTestCases 試験結果通知"
    description: "5ワード全て含まれる場合に通知"
    validate_box: false
    download_mode: bts_gts  # link[0]=BTS(ZIP直DL), link[1]=GTS(2階層上から再帰DL)
    keywords:
      must:
        - "大橋様"
        - "BTS/GtsEdiHostTestCases"
        - "◆BTS"
        - "◆GtsEdiHostTestCases"
        - "https://app.box.com/"
    threshold:
      notify_min_score: 100
